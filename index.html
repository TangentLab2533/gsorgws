<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>G7组织</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      border: 0;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    iframe {
      display: block;
      width: 100%;
      height: 100vh;
      border: none;
    }
    /* 链接提示样式 */
    .http-link-tip {
      display: none; /* 默认隐藏 */
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #fff;
      font-size: 18px;
      text-align: center;
    }
    .http-link-tip a {
      color: #409eff;
      text-decoration: none;
      margin-top: 10px;
      font-size: 20px;
    }
    .http-link-tip a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <!-- iframe容器 -->
  <iframe id="mainIframe" src="http://8.154.28.102" frameborder="0" allowfullscreen></iframe>
  
  <!-- HTTPS访问时显示的提示链接 -->
  <div id="httpLinkTip" class="http-link-tip">
    该页面需要通过HTTP协议访问<br/>
    <a href="http://gsorg.tangentlab.cn" target="_self">点击跳转到HTTP版本（直接）</a>
    <a href="http://g7g.icu" target="_self">点击此处通过短连接方法跳转（如果上面那个有问题就用这个）</a>
    若实在不行跳转失败，则手动输入网址：http://gsorg.tangentlab.cn，不能用https，否则访问不了
  </div>

  <script>
    // 获取DOM元素
    const iframe = document.getElementById('mainIframe');
    const linkTip = document.getElementById('httpLinkTip');

    // 检测当前页面的访问协议
    if (window.location.protocol === 'https:') {
      // HTTPS访问：隐藏iframe，显示提示链接
      iframe.style.display = 'none';
      linkTip.style.display = 'flex';
    } else {
      // HTTP访问：隐藏提示链接，显示iframe
      iframe.style.display = 'block';
      linkTip.style.display = 'none';
    }
  </script>
</body>
</html>
